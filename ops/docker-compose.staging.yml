# Staging stack for damplab-canvas (i-0f1c9bf9cfc90bf9a).
# Mirror of the live compose at /home/ubuntu/damplab/docker-compose.yml on
# that instance. **Authoritative source: this file** — sync the box from here.
#
# Differs from prod in three ways:
# - Runs Keycloak + its Postgres (the shared auth for both environments).
# - Image tags pinned to :main (auto-deployed on every push).
# - Backup writes to s3://sail-data-backups/damplab-auth-staging/.

services:

  damplab-ui:
    image: hicsail/damplab-ui:main
    ports:
      - 80:80
    restart: unless-stopped
    depends_on:
      - damplab-backend
      - keycloak

  damplab-backend:
    image: hicsail/damplab-backend:main
    ports:
      - 3000:3000
    environment:
      - MONGO_URI=mongodb://backend-db:27017/damplab
      - JWKS_ENDPOINT=${JWKS_ENDPOINT}
      - AWS_REGION=us-east-1
      - JOB_ATTACHMENTS_BUCKET=damplab
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - KEYCLOAK_SERVER_URL=${KEYCLOAK_SERVER_URL}
      - KEYCLOAK_REALM=damplab
      - KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID}
      - KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET}
      - KEYCLOAK_LAB_STAFF_GROUP_NAME=${KEYCLOAK_LAB_STAFF_GROUP_NAME}
    restart: unless-stopped
    depends_on:
      - backend-db

  keycloak:
    image: quay.io/keycloak/keycloak:26.1.3
    mem_limit: 1gb
    ports:
      - 8443:8443
    environment:
      - KC_BOOTSTRAP_ADMIN_USERNAME=admin
      - KC_BOOTSTRAP_ADMIN_PASSWORD=${KC_BOOTSTRAP_ADMIN_PASSWORD}
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://keycloak-db/keycloak
      - KC_DB_USERNAME=keycloak
      - KC_DB_PASSWORD=${KEYCLOAK_DB_PASSWORD}
      - KC_HTTPS_CERTIFICATE_FILE=/run/secrets/tls-cert-fullchain
      - KC_HTTPS_CERTIFICATE_KEY_FILE=/run/secrets/tls-key
      - KC_HOSTNAME=https://damplab-keycloak.sail.codes
    secrets:
      - tls-cert-fullchain
      - tls-key
    command: start
    restart: unless-stopped
    depends_on:
      - keycloak-db

  backend-db:
    image: mongo:7.0
    volumes:
      - damplab-mongo:/data/db
    restart: unless-stopped

  keycloak-db:
    image: postgres:17
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
    volumes:
      - damplab-keycloak-pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  backup:
    image: offen/docker-volume-backup:v2.43.3
    environment:
      BACKUP_CRON_EXPRESSION: "5 2 * * 3"
      AWS_S3_BUCKET_NAME: sail-data-backups
      AWS_S3_PATH: damplab-auth-staging
      AWS_ACCESS_KEY_ID: ${BACKUP_AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${BACKUP_AWS_SECRET_ACCESS_KEY}
    # NB: currently only backing up Keycloak data. Mongo backend data is NOT
    # backed up on staging. (Prod has Mongo backup wired up — see prod compose.)
    volumes:
      - damplab-keycloak-pgdata:/backup:ro
    restart: unless-stopped

volumes:
  damplab-mongo:
    external: true
  damplab-keycloak-pgdata:
    external: true

secrets:
  tls-cert-fullchain:
    file: ./tls/fullchain17.pem
  tls-key:
    file: ./tls/privkey17.pem
